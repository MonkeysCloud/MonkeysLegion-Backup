name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: json, zlib
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPStan static analysis
        run: composer stan

  tests:
    name: PHPUnit (full suite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start test services
        run: |
          docker compose -f docker-compose.testing.yml up -d --wait \
            fake-gcs minio mysql postgres mongodb redis
          docker compose -f docker-compose.testing.yml up --no-deps \
            mysql-init postgres-init redis-init

      - name: Install database clients
        run: bash .github/scripts/install-db-clients.sh

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: json, zlib, pdo_mysql, pdo_pgsql
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Configure test environment
        run: cp .env.testing .env

      - name: Run full PHPUnit suite
        run: composer test:all
