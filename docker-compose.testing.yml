services:
  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    container_name: mb_fake_gcs
    ports:
      - "4443:4443"
    command:
      - -scheme
      - http
      - -port
      - "4443"
      - -public-host
      - "localhost:4443"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4443/_internal/healthcheck"]
      interval: 2s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: mb_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 15

  mysql:
    image: mysql:8.4
    container_name: mb_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: mb_test_dump
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-psecret"]
      interval: 3s
      timeout: 5s
      retries: 20

  mysql-init:
    image: mysql:8.4
    container_name: mb_mysql_init
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD: secret
    command: >
      bash -c "mysql -h mysql -u root -psecret -e
      'CREATE DATABASE IF NOT EXISTS mb_test_restore;'"
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: mb_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mb_test_dump
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 20

  postgres-init:
    image: postgres:16-alpine
    container_name: mb_postgres_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: secret
    command: >
      psql -h postgres -U postgres -c "CREATE DATABASE mb_test_restore;"
    restart: "no"

  mongodb:
    image: mongo:7
    container_name: mb_mongodb
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 3s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: mb_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 15

  redis-init:
    image: redis:7-alpine
    container_name: mb_redis_init
    depends_on:
      redis:
        condition: service_healthy
    command: >
      redis-cli -h redis ACL SETUSER backupuser on ">analikayn" "~*" "+@all"
    restart: "no"
